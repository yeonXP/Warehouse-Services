<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SmartWMS Operator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/operator.css">
</head>
<body>
    <div class="operator-container">

        <div class="top-bar">
            <div>
                <h1>SmartWMS</h1>
                <p>Operator Work Console</p>
            </div>
            <span class="online-badge">ONLINE</span>
        </div>

        <div class="profile-card">
            <div class="profile-icon">OP</div>
            <div>
                <h2>작업자 모드</h2>
                <p>입고 또는 출고 작업을 선택하세요.</p>
            </div>
        </div>

        <div class="section-title">
            오늘 작업 현황
            <span>2026-06-29</span>
        </div>

        <div class="status-grid">
            <div class="status-card inbound-status">
                <div class="status-icon">📥</div>
                <p>입고 예정</p>
                <h3>12 <span>건</span></h3>
            </div>

            <div class="status-card outbound-status">
                <div class="status-icon">📤</div>
                <p>출고 예정</p>
                <h3>8 <span>건</span></h3>
            </div>
        </div>

        <div class="work-buttons">
            <a href="/pda?mode=inbound" class="work-btn inbound-btn">
                <div>
                    <strong>입고 작업</strong>
                    <p>상품을 입고합니다.</p>
                </div>
                <span>→</span>
            </a>

            <a href="/pda?mode=outbound" class="work-btn outbound-btn">
                <div>
                    <strong>출고 작업</strong>
                    <p>상품을 출고합니다.</p>
                </div>
                <span>→</span>
            </a>
        </div>

        <div class="recent-card">
            <div class="recent-header">
                <h3>최근 작업 내역</h3>
                <span>Mock Data</span>
            </div>

            <div class="history-row">
                <div>
                    <strong>P001</strong>
                    <p>Keyboard</p>
                </div>
                <span class="tag inbound-tag">입고</span>
                <span>10 EA</span>
            </div>

            <div class="history-row">
                <div>
                    <strong>P003</strong>
                    <p>USB-C Cable</p>
                </div>
                <span class="tag outbound-tag">출고</span>
                <span>5 EA</span>
            </div>
        </div>

        <div class="footer">
            SmartWMS UserService · Operator Home
        </div>

    </div>
</body>
</html>
